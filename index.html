
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
#wrap{font-family:var(--font-sans);display:flex;flex-direction:column;align-items:center;width:100%;background:#0a0a1a;min-height:620px;padding:10px 8px 20px;color:#fff;}
#canvas-wrap{position:relative;width:100%;max-width:420px;}
canvas{display:block;width:100%;border-radius:8px;background:#0a0a1a;}
#hud{width:100%;max-width:420px;display:flex;justify-content:space-between;align-items:center;padding:6px 0 4px;}
.hud-pill{background:#1a1a2e;border:0.5px solid #333;border-radius:99px;padding:4px 12px;font-size:13px;font-weight:500;color:#ccc;}
.hud-pill b{color:#7ee8a2;}
#lives-row{display:flex;gap:4px;}
.heart{font-size:16px;}
#msg-bar{width:100%;max-width:420px;text-align:center;font-size:14px;color:#aaa;min-height:20px;margin:2px 0;}
#quiz-panel{width:100%;max-width:420px;background:#111827;border:0.5px solid #2d3748;border-radius:12px;padding:12px 14px;margin-top:6px;display:none;flex-direction:column;gap:8px;}
#quiz-soldier{font-size:13px;font-weight:500;color:#7dd3fc;}
#quiz-q{font-size:22px;font-weight:500;color:#fff;text-align:center;}
#quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.choice-btn{background:#1e293b;border:0.5px solid #334155;border-radius:8px;padding:10px 0;font-size:18px;font-weight:500;color:#fff;cursor:pointer;transition:background 0.1s;}
.choice-btn:active{background:#334155;}
.choice-btn.correct{background:#14532d;border-color:#22c55e;color:#86efac;}
.choice-btn.wrong{background:#7f1d1d;border-color:#ef4444;color:#fca5a5;}
#overlay{display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px 16px;width:100%;max-width:420px;background:#111827;border:0.5px solid #2d3748;border-radius:12px;margin-top:8px;}
#overlay h2{font-size:22px;font-weight:500;}
#overlay p{font-size:14px;color:#9ca3af;text-align:center;}
#overlay button{background:#3730a3;border:none;color:#c7d2fe;padding:10px 28px;border-radius:8px;font-size:15px;cursor:pointer;font-weight:500;}
#overlay button:active{opacity:0.85;}
#level-badge{font-size:13px;font-weight:500;color:#a78bfa;}
</style>

<div id="wrap">
  <div id="hud">
    <div class="hud-pill">Score <b id="score-val">0</b></div>
    <div id="level-badge">Level 1</div>
    <div class="hud-pill">Lives <span id="lives-row">❤️❤️❤️</span></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="gc" width="420" height="480"></canvas>
  </div>
  <div id="msg-bar"></div>
  <div id="quiz-panel">
    <div id="quiz-soldier"></div>
    <div id="quiz-q"></div>
    <div id="quiz-choices"></div>
  </div>
  <div id="overlay">
    <h2 id="ov-title"></h2>
    <p id="ov-sub"></p>
    <button id="ov-btn">Play again</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = 420, H = 480;
canvas.width = W; canvas.height = H;

const ALIEN_TYPES = [
  { color:'#c084fc', eye:'#fff', shape:'saucer', pts:10 },
  { color:'#fb923c', eye:'#fff', shape:'blob',   pts:15 },
  { color:'#34d399', eye:'#fff', shape:'spike',  pts:20 },
  { color:'#f87171', eye:'#fff', shape:'cube',   pts:25 },
];

const LEVEL_CFG = [
  { speed:0.5, spawnMs:2800, aliensToWin:8,  mathMax:10 },
  { speed:0.9, spawnMs:2000, aliensToWin:12, mathMax:20 },
  { speed:1.5, spawnMs:1400, aliensToWin:16, mathMax:30 },
];

let state, aliens, lasers, particles, pendingKill, quizActive, score, lives, level, cfg,
    spawnTimer, aliensKilled, msgTimeout, loopId, lastTime;

const $ = id => document.getElementById(id);
const qp = $('quiz-panel'), overlay = $('overlay');
const msgBar = $('msg-bar');

function showMsg(t, col='#9ca3af') { msgBar.style.color=col; msgBar.textContent=t; clearTimeout(msgTimeout); msgTimeout=setTimeout(()=>msgBar.textContent='',2200); }

function initGame(lvl=0) {
  level = lvl;
  cfg = LEVEL_CFG[level];
  aliens = []; lasers = []; particles = [];
  pendingKill = null; quizActive = false;
  score = lvl===0 ? 0 : score;
  lives = lvl===0 ? 3 : lives;
  aliensKilled = 0;
  spawnTimer = 0;
  state = 'playing';
  updateHUD();
  qp.style.display = 'none';
  overlay.style.display = 'none';
  $('level-badge').textContent = 'Level ' + (level+1);
  showMsg('Level ' + (level+1) + ' — protect Earth!', '#a78bfa');
  if (loopId) cancelAnimationFrame(loopId);
  lastTime = null;
  loopId = requestAnimationFrame(loop);
}

function updateHUD() {
  $('score-val').textContent = score;
  let h = '';
  for (let i=0;i<lives;i++) h+='❤️';
  for (let i=lives;i<3;i++) h+='🖤';
  $('lives-row').innerHTML = h;
}

function spawnAlien() {
  const t = ALIEN_TYPES[Math.floor(Math.random()*ALIEN_TYPES.length)];
  const x = 30 + Math.random()*(W-60);
  aliens.push({ x, y:-30, vx:(Math.random()-0.5)*0.6, vy:cfg.speed, type:t, w:34, h:28, dead:false, wobble:Math.random()*Math.PI*2 });
}

function drawAlien(a) {
  const {x,y,type:t,w,h,wobble} = a;
  ctx.save();
  ctx.translate(x, y + Math.sin(wobble)*3);
  ctx.fillStyle = t.color;
  if (t.shape==='saucer') {
    ctx.beginPath(); ctx.ellipse(0,4,w/2,h/3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = t.color+'cc';
    ctx.beginPath(); ctx.ellipse(0,-2,w/3,h/2.5,0,0,Math.PI*2); ctx.fill();
  } else if (t.shape==='blob') {
    ctx.beginPath();
    ctx.moveTo(0,-h/2); ctx.bezierCurveTo(w/2,-h/2,w/2,h/2,0,h/2);
    ctx.bezierCurveTo(-w/2,h/2,-w/2,-h/2,0,-h/2); ctx.fill();
  } else if (t.shape==='spike') {
    ctx.beginPath();
    ctx.moveTo(0,-h/2); ctx.lineTo(w/3,0); ctx.lineTo(w/2,h/2);
    ctx.lineTo(0,h/3); ctx.lineTo(-w/2,h/2); ctx.lineTo(-w/3,0); ctx.closePath(); ctx.fill();
  } else {
    ctx.fillRect(-w/2,-h/2,w,h);
    ctx.fillStyle='#ffffff22';
    ctx.fillRect(-w/2,-h/2,w/4,h/4);
  }
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath(); ctx.ellipse(-7,-4,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7,-4,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(-7,-4,2.5,2.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7,-4,2.5,2.5,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawSoldier(x, y, name, isEmma) {
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = isEmma ? '#f9a8d4' : '#93c5fd';
  ctx.beginPath(); ctx.arc(0,-22,10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = isEmma ? '#db2777' : '#1d4ed8';
  ctx.fillRect(-9,-12,18,22);
  ctx.fillStyle = isEmma ? '#f9a8d4' : '#93c5fd';
  ctx.fillRect(-14,-8,7,15); ctx.fillRect(7,-8,7,15);
  ctx.fillRect(-7,10,6,14); ctx.fillRect(1,10,6,14);
  ctx.fillStyle = '#fbbf24';
  ctx.font = 'bold 9px sans-serif'; ctx.textAlign='center';
  ctx.fillText(name, 0, -34);
  ctx.restore();
}

function drawLaser(l) {
  ctx.save();
  const grad = ctx.createLinearGradient(l.x, l.y, l.x, l.y+l.h);
  grad.addColorStop(0, l.col+'ff');
  grad.addColorStop(1, l.col+'44');
  ctx.fillStyle = grad;
  ctx.fillRect(l.x-2, l.y, 4, l.h);
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function explode(x, y, col) {
  for (let i=0;i<12;i++) {
    const ang = Math.random()*Math.PI*2, spd = 1+Math.random()*3;
    particles.push({ x, y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, r:2+Math.random()*3, col, life:1 });
  }
}

function drawBg() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0,H-50,W,50);
  ctx.fillStyle = '#065f46';
  ctx.fillRect(0,H-50,W,8);
  for (let i=0;i<60;i++) {
    const sx = (i*73+11)%W, sy = (i*97+17)%(H-80);
    ctx.fillStyle = `rgba(255,255,255,${0.2+((i*31)%10)/30})`;
    ctx.fillRect(sx,sy,1,1);
  }
  ctx.fillStyle = '#1e3a5f';
  ctx.beginPath(); ctx.arc(W/2,H-25,22,Math.PI,0); ctx.fill();
  ctx.fillStyle = '#1e40af';
  for (let i=0;i<5;i++) {
    ctx.beginPath(); ctx.arc(60+i*75, H-20, 14, Math.PI, 0); ctx.fill();
  }
}

function genQuestion() {
  const max = cfg.mathMax;
  const ops = ['+','-','x'];
  const op = ops[Math.floor(Math.random()*ops.length)];
  let a,b,ans;
  if (op==='+') { a=Math.floor(Math.random()*max)+1; b=Math.floor(Math.random()*max)+1; ans=a+b; }
  else if (op==='-') { a=Math.floor(Math.random()*max)+1; b=Math.floor(Math.random()*(a))+1; ans=a-b; }
  else { a=Math.floor(Math.random()*5)+1; b=Math.floor(Math.random()*5)+1; ans=a*b; }
  const wrongs = new Set();
  while (wrongs.size<3) {
    let w = ans + (Math.floor(Math.random()*7)-3);
    if (w!==ans && w>=0) wrongs.add(w);
  }
  const choices = [...wrongs, ans].sort(()=>Math.random()-0.5);
  return { q:`${a} ${op} ${b} = ?`, ans, choices };
}

function showQuiz(alien) {
  pendingKill = alien;
  quizActive = true;
  qp.style.display = 'flex';
  const isEmma = alien.x < W/2;
  $('quiz-soldier').textContent = (isEmma ? '👩 Emma' : '👨 Adam') + ' is ready to fire!';
  const qq = genQuestion();
  $('quiz-q').textContent = qq.q;
  const cc = $('quiz-choices');
  cc.innerHTML = '';
  qq.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.onclick = () => handleAnswer(c, qq.ans, btn, alien);
    cc.appendChild(btn);
  });
}

function handleAnswer(chosen, correct, btn, alien) {
  document.querySelectorAll('.choice-btn').forEach(b=>b.onclick=null);
  if (chosen===correct) {
    btn.classList.add('correct');
    setTimeout(()=>{
      qp.style.display='none';
      quizActive=false;
      fireLaser(alien);
    },500);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b=>{ if(parseInt(b.textContent)===correct) b.classList.add('correct'); });
    showMsg('Wrong! The alien slips through...', '#f87171');
    setTimeout(()=>{
      qp.style.display='none';
      quizActive=false;
      pendingKill=null;
      if(alien) alien.frozen=false;
    },1000);
  }
}

function fireLaser(alien) {
  const fromX = alien.x < W/2 ? 35 : W-35;
  const col = alien.x < W/2 ? '#f472b6' : '#60a5fa';
  lasers.push({ x:fromX, y:H-55, tx:alien.x, ty:alien.y, col, progress:0, alien });
}

function tickLasers(dt) {
  for (let i=lasers.length-1;i>=0;i--) {
    const l = lasers[i];
    l.progress += dt * 0.004;
    if (l.progress>=1) {
      if (!l.alien.dead) {
        l.alien.dead = true;
        explode(l.alien.x, l.alien.y, l.alien.type.color);
        score += l.alien.type.pts;
        aliensKilled++;
        showMsg('+' + l.alien.type.pts + ' points!', '#7ee8a2');
        updateHUD();
      }
      lasers.splice(i,1);
    }
  }
}

function getLaserLine(l) {
  const t = l.progress;
  return { x: l.x+(l.tx-l.x)*t, y: l.y+(l.ty-l.y)*t, h: 18 };
}

function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min(ts-lastTime, 50);
  lastTime = ts;
  if (state!=='playing') return;

  spawnTimer += dt;
  if (spawnTimer > cfg.spawnMs) { spawnAlien(); spawnTimer=0; }

  for (const a of aliens) {
    if (a.dead||a.frozen) continue;
    a.wobble += 0.04;
    a.y += a.vy * (dt/16);
    a.x += a.vx * (dt/16);
    if (a.x<20) a.vx=Math.abs(a.vx);
    if (a.x>W-20) a.vx=-Math.abs(a.vx);

    if (!quizActive && !a.frozen) {
      const distEmma = Math.hypot(a.x-35, a.y-(H-55));
      const distAdam = Math.hypot(a.x-(W-35), a.y-(H-55));
      if (distEmma < 180 && a.x < W/2 || distAdam < 180 && a.x >= W/2) {
        if (a.y > H/3) {
          a.frozen = true;
          showQuiz(a);
        }
      }
    }

    if (a.y > H-44) {
      a.dead = true;
      lives--;
      explode(a.x, H-44, '#ef4444');
      showMsg('An alien reached Earth!', '#f87171');
      updateHUD();
      if (lives<=0) { state='gameover'; endGame(false); return; }
    }
  }

  aliens = aliens.filter(a=>!a.dead||a.y<H+40);
  tickLasers(dt);

  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life-=0.04;
    if(p.life<=0) particles.splice(i,1);
  }

  drawBg();
  for (const a of aliens) if (!a.dead) drawAlien(a);
  for (const l of lasers) { const ln=getLaserLine(l); drawLaser({...ln, col:l.col}); }
  drawParticles();
  drawSoldier(35, H-55, 'Emma', true);
  drawSoldier(W-35, H-55, 'Adam', false);

  if (aliensKilled >= cfg.aliensToWin) {
    if (level < 2) { state='levelup'; endGame(true); }
    else { state='win'; endGame(true, true); }
    return;
  }

  loopId = requestAnimationFrame(loop);
}

function endGame(won, finalWin=false) {
  cancelAnimationFrame(loopId);
  qp.style.display='none';
  overlay.style.display='flex';
  if (finalWin) {
    $('ov-title').textContent = 'Earth is saved!';
    $('ov-sub').textContent = 'Amazing! You defeated all aliens across 3 levels. Final score: ' + score;
    $('ov-btn').textContent = 'Play again';
    $('ov-btn').onclick = () => initGame(0);
  } else if (won) {
    $('ov-title').textContent = 'Level ' + (level+1) + ' cleared!';
    $('ov-sub').textContent = 'Great job! Get ready for faster aliens. Score: ' + score;
    $('ov-btn').textContent = 'Next level';
    $('ov-btn').onclick = () => initGame(level+1);
  } else {
    $('ov-title').textContent = 'Earth was invaded...';
    $('ov-sub').textContent = 'The aliens broke through! Score: ' + score + '. Try again!';
    $('ov-btn').textContent = 'Try again';
    $('ov-btn').onclick = () => initGame(0);
  }
}

initGame(0);
</script>
